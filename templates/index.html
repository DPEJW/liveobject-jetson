<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LIVEOBJECT — Jetson Orin NX vision</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="{{ url_for('static', filename='vendor/chart.umd.min.js') }}"></script>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <header class="rail">
    <div class="ident">
      <span class="reactor" aria-hidden="true"></span>
      <h1>LIVEOBJECT</h1>
      <span class="sub">JETSON&nbsp;ORIN&nbsp;NX · RTSP/NVDEC · YOLO26</span>
    </div>
    <div class="rail-meta">
      <span class="meta-chip">NODE <b>orinnx1</b></span>
      <span class="meta-chip">192.168.1.180</span>
      <span class="meta-chip clock" id="clock">--:--:--</span>
      <span class="live"><span id="status-dot" class="dot" title="live"></span><span class="live-tx">LIVE</span></span>
    </div>
  </header>

  <main>
    <section class="viewport-card">
      <div class="vp-head">
        <span class="vp-tag">CAM·01</span>
        <span class="vp-src" id="vp-source">RTSP / MAIN</span>
        <span class="vp-rec"><i></i>REC</span>
      </div>
      <div class="video-wrap" id="video-wrap">
        <img id="stream" src="{{ url_for('stream') }}" alt="live detection feed">
        <div class="reticle" aria-hidden="true"></div>
        <span class="bk tl" aria-hidden="true"></span>
        <span class="bk tr" aria-hidden="true"></span>
        <span class="bk bl" aria-hidden="true"></span>
        <span class="bk br" aria-hidden="true"></span>
        <div id="paused-overlay" class="overlay hidden"><span>◼ PAUSED</span></div>
        <button id="fs-btn" class="fs-btn" title="Fullscreen" aria-label="Fullscreen">⛶</button>
        <button id="fs-exit" class="fs-exit hidden" title="Exit fullscreen (Esc)">✕ EXIT</button>
      </div>
      <div class="readout-strip">
        <div class="ro"><span class="ro-k">FPS</span><b id="m-fps">0.0</b></div>
        <div class="ro"><span class="ro-k">INFER</span><b id="m-infer">0</b><span class="ro-u">ms</span></div>
        <div class="ro"><span class="ro-k">OBJECTS</span><b id="m-count">0</b></div>
        <div class="ro"><span class="ro-k">MODEL</span><b id="m-model" class="alt">—</b></div>
        <div class="ro"><span class="ro-k">DECODE</span><b id="backend" class="alt">—</b></div>
      </div>
    </section>

    <aside class="panel">
      <div class="card" data-reveal="1">
        <h2>Camera</h2>
        <label class="ctl">
          <span>Source</span>
          <select id="camera-source"></select>
        </label>
        <label class="ctl" id="stream-ctl">
          <span>RTSP stream</span>
          <select id="rtsp-stream"></select>
        </label>
      </div>

      <div class="card" data-reveal="2">
        <h2>Detection</h2>
        <label class="ctl">
          <span>Model</span>
          <select id="model"></select>
        </label>
        <label class="ctl">
          <span>Max detections <b id="maxd-val">10</b></span>
          <input id="maxd" type="range" min="1" max="50" value="10">
        </label>
        <label class="ctl">
          <span>Confidence <b id="thr-val">0.40</b></span>
          <input id="thr" type="range" min="5" max="95" value="40">
        </label>
        <label class="ctl">
          <span>Orientation <b id="rot-val">0°</b></span>
          <button id="rotate" class="btn ghost" data-rot="0">ROTATE 90° ↻</button>
        </label>
        <label class="ctl">
          <span>Transform</span>
          <div class="btn-row">
            <button id="flip-h" class="btn ghost">MIRROR ⇆</button>
            <button id="flip-v" class="btn ghost">FLIP ⇅</button>
          </div>
        </label>
        <div class="btn-row">
          <button id="pause" class="btn">PAUSE</button>
          <button id="snap" class="btn">SNAPSHOT</button>
          <a id="snap-link" class="btn ghost hidden" href="/snapshot/latest" target="_blank">VIEW</a>
        </div>
      </div>

      <div class="card" data-reveal="3">
        <h2>Telemetry</h2>
        <div class="gauge">
          <div class="gauge-top"><span class="k">CPU</span><span class="v"><b id="s-cpu">0</b>%</span></div>
          <div class="meter"><i id="bar-cpu"></i></div>
        </div>
        <div class="gauge">
          <div class="gauge-top"><span class="k">RAM</span><span class="v"><b id="s-ram">0</b>%</span></div>
          <div class="meter"><i id="bar-ram"></i></div>
        </div>
        <div class="micro-grid">
          <div><span class="k">RAM USED</span><span class="v"><b id="s-rammb">0</b> MB</span></div>
          <div><span class="k">CPU TEMP</span><span class="v"><b id="s-temp">—</b> °C</span></div>
        </div>
        <div class="chart-box"><canvas id="fpsChart"></canvas></div>
        <div class="chart-box"><canvas id="ramChart"></canvas></div>
      </div>

      <div class="card" data-reveal="4">
        <h2>Detections <span id="det-count" class="tag">0</span></h2>
        <ul id="det-list" class="det-list"><li class="muted">awaiting signal…</li></ul>
      </div>
    </aside>
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
